<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tablero Táctico | Saleros vs Limones</title>
  <meta name="description" content="Tablero táctico responsivo con saleros vs limones en formación 1-4-2-3-1." />
  <meta name="theme-color" content="#143824" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-wrap">
        <div class="title-ball">⚽</div>
        <div>
          <h1>Tablero Táctico</h1>
          <p>Saleros vs limones · Formación base 1-4-2-3-1</p>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="board-panel">
        <div id="pitch" class="pitch" aria-label="Cancha táctica de fútbol"></div>
      </section>

      <div class="actions">
        <button id="resetBtn" class="btn btn-primary" type="button">Reiniciar</button>
        <button id="flipBtn" class="btn btn-secondary" type="button">Invertir Lados</button>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
